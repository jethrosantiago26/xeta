<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">XETA P1 Speed</title>
  <desc id="desc">Minimal product placeholder for the XETA P1 Speed mousepad.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ece7dd" />
      <stop offset="100%" stop-color="#c8beb0" />
    </linearGradient>
    <linearGradient id="pad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4d5a66" />
      <stop offset="100%" stop-color="#1e2730" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" rx="64" fill="url(#bg)" />
  <circle cx="920" cy="180" r="180" fill="#f2ece1" opacity="0.9" />
  <circle cx="260" cy="760" r="220" fill="#90a0b1" opacity="0.18" />
  <g transform="translate(120 210)">
    <rect x="0" y="70" width="960" height="420" rx="48" fill="url(#pad)" stroke="#b7afa1" stroke-width="10" />
    <rect x="40" y="110" width="880" height="340" rx="28" fill="#70808d" opacity="0.34" />
    <text x="70" y="580" fill="#463e33" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" letter-spacing="6">XETA P1 SPEED</text>
    <text x="70" y="630" fill="#6f6659" font-family="Arial, Helvetica, sans-serif" font-size="28">Low friction speed surface</text>
  </g>
</svg>