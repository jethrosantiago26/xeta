server {
    listen 8080;
    server_name _;
    root /var/www/html/public;
    index index.php;
    client_max_body_size 12M;

    location / {
        # Handle CORS preflight inside location / (add_header is valid here).
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'      'https://xeta-commerce.vercel.app' always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, Accept, X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age'           '3600' always;
            add_header 'Content-Length'                   '0';
            add_header 'Content-Type'                     'text/plain; charset=UTF-8';
            return 204;
        }

        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # Also intercept OPTIONS before passing to PHP-FPM, because
        # try_files internally rewrites to /index.php which hits this block.
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'      'https://xeta-commerce.vercel.app' always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, Accept, X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age'           '3600' always;
            add_header 'Content-Length'                   '0';
            add_header 'Content-Type'                     'text/plain; charset=UTF-8';
            return 204;
        }

        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }
}
